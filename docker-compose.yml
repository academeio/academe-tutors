services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    env_file: .env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: ../docker/Dockerfile.web
    ports:
      - "${FRONTEND_PORT:-3782}:3782"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8001}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${BACKEND_PORT:-8001}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
